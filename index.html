<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Daniela - Inicio de Sesion</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #E6E6FA; /* Lavanda */
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            border-radius: 50px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 400px;
            padding: 40px;
            text-align: center;
        }
        .logo {
            font-family: 'Pacifico', cursive;
            color: #8A2BE2; 
            font-size: 3em;
            margin-bottom: 20px;
        }
        h2 {
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        input {
            width: calc(100% - 30px);
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 1em;
        }
        input:focus {
            outline: none;
            border-color: #8A2BE2;
        }
        .login-btn {
            background-color: #8A2BE2;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .login-btn:hover {
            background-color: #6A1B9A;
        }
        .forgot-password {
            margin-top: 15px;
            font-size: 0.9em;
            color: #666;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Daniela</div>
        <h2>INICIO DE SESION</h2>
        
        <input type="text" id="username" placeholder="Usuario">
        <input type="password" id="password" placeholder="Contraseña">
        
        <button class="login-btn" id="btnIngresar">Login</button>
        
        <div class="forgot-password">¿Olvidaste tu contraseña?</div>
    </div>

    <script>
        document.getElementById('btnIngresar').addEventListener('click', function() {
            window.location.href = 'menu.html'; 
        });
    </script>
</body>
</html>

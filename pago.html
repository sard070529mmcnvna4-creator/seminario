<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Daniela - Medios de Pago</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background-color: #CDD1FC; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }

        .window-frame {
            width: 100%;
            max-width: 1000px;
            position: relative;
        }
        .logo-container {
            background: #81C3D7;
            padding: 4px;
            border-radius: 50px;
            display: inline-block;
            position: absolute;
            top: -10px;
            left: 10px;
            z-index: 10;
        }
        .logo-badge {
            background: white;
            width: 75px;
            height: 75px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Pacifico', cursive;
            font-size: 1.2em;
            color: #333;
            border: 2px dashed #81C3D7;
        }
        .banner-container {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 60px;
        }
        .ribbon-banner {
            background-color: #A2C2F2;
            display: inline-block;
            padding: 12px 80px;
            border: 2px solid #000;
            position: relative;
            font-family: 'Arial Black', Gadget, sans-serif;
            font-size: 2.2em;
            font-weight: 900;
            color: #000;
            letter-spacing: -1px;
            clip-path: polygon(5% 0%, 95% 0%, 100% 50%, 95% 100%, 5% 100%, 0% 50%);
        }

        .options-grid {
            display: flex;
            justify-content: center;
            gap: 100px;
            align-items: center;
            margin-top: 40px;
        }

        .option-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }
        .cash-icon-art {
            font-size: 6.5em;
            color: #EF5DA8;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .card-icon-art {
            width: 260px;
            height: 160px;
            background-color: #83729F; 
            border: 4px solid #000;
            border-radius: 18px;
            position: relative;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .card-icon-art::before {
            content: "";
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            height: 30px;
            background-color: #000; 
        }
        .card-icon-art::after {
            content: "";
            position: absolute;
            bottom: 45px;
            left: 20px;
            width: 100px;
            height: 12px;
            background-color: white;
            border-radius: 4px;
            box-shadow: 0 20px 0 white; 
        }
        .card-white-bar {
            position: absolute;
            right: 15px;
            top: 60px;
            width: 10px;
            height: 50px;
            background: white;
            border-radius: 5px;
        }
        .card-white-dot {
            position: absolute;
            right: 15px;
            bottom: 30px;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
        }

        .cash-icon-art:hover, .card-icon-art:hover {
            transform: scale(1.05);
        }
        .pill-btn {
            background: white;
            color: black;
            border: 2px solid #000;
            padding: 8px 45px;
            border-radius: 20px;
            font-size: 1.2em;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            box-shadow: 2px 2px 0px rgba(0,0,0,1);
            transition: background 0.2s;
        }
        .pill-btn:hover { background: #f0f0f0; }

        .hidden {
            display: none !important;
        }

        .big-card-form {
            width: 100%;
            max-width: 650px;
            background-color: #83729F;
            border: 5px solid #000;
            border-radius: 30px;
            margin: 40px auto;
            padding: 30px;
            box-shadow: 8px 8px 0px #61537A;
            position: relative;
        }
        .big-card-form::before {
            content: "";
            position: absolute;
            top: 70px;
            left: 0;
            width: 100%;
            height: 45px;
            background-color: #000;
        }
        .big-card-decorations {
            position: absolute;
            right: 30px;
            top: 130px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }
        .decor-bar { width: 12px; height: 90px; background: white; border-radius: 6px; }
        .decor-dot { width: 12px; height: 12px; background: white; border-radius: 50%; }

        .card-form-title {
            font-size: 2.2em;
            font-weight: bold;
            color: black;
            margin: 0 0 100px 20px;
            font-family: 'Arial Black', sans-serif;
        }

        .form-group {
            margin-bottom: 25px;
            margin-left: 20px;
            max-width: 70%;
        }
        .form-group label {
            display: block;
            color: white;
            font-size: 1.2em;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 10px 15px;
            border: 4px solid #000;
            border-radius: 10px;
            font-size: 1.1em;
            outline: none;
        }
        .footer-action {
            text-align: right;
            margin-top: 40px;
        }

    </style>
</head>
<body>

    <div class="window-frame">
        <div class="logo-container">
            <div class="logo-badge">Daniela</div>
        </div>

        <div id="pantalla-medios">
            <div class="banner-container">
                <div class="ribbon-banner">medios de pago</div>
            </div>

            <div class="options-grid">
                <div class="option-box">
                    <i class="fas fa-hand-holding-usd cash-icon-art" onclick="pagarConEfectivo()"></i>
                    <button class="pill-btn" onclick="pagarConEfectivo()">efectivo</button>
                </div>
                <div class="option-box">
                    <div class="card-icon-art" onclick="irAFormularioTarjeta()">
                        <div class="card-white-bar"></div>
                        <div class="card-white-dot"></div>
                    </div>
                    <button class="pill-btn" onclick="irAFormularioTarjeta()">tarjeta</button>
                </div>
            </div>
        </div>
        <div id="pantalla-tarjeta" class="hidden">
            <div class="big-card-form">
                <div class="big-card-decorations">
                    <div class="decor-bar"></div>
                    <div class="decor-dot"></div>
                </div>

                <div class="card-form-title">tarjeta</div>
                <div class="form-group">
                    <label for="card-name">nombre</label>
                    <input type="text" id="card-name" placeholder="Ej. Daniela López">
                </div>

                <div class="form-group">
                    <label for="card-number">numero de tarjeta</label>
                    <input type="text" id="card-number" placeholder="0000 0000 0000 0000" maxlength="19">
                </div>
            </div>
            <div class="footer-action">
                <button class="pill-btn" id="btnFinalizarTarjeta">pagar</button>
            </div>
        </div>

    </div>

    <script>
        function pagarConEfectivo() {
            let carrito = JSON.parse(localStorage.getItem('carrito')) || [];
            if(carrito.length === 0) {
                alert("Tu carrito está vacío.");
                window.location.href = 'menu.html';
                return;
            }

            alert("¡Pedido Confirmado! Tu orden ha sido recibida con éxito. Realizarás tu pago en efectivo al momento de la entrega.");
            
            localStorage.removeItem('carrito');
            
            window.location.href = 'menu.html';
        }

        function irAFormularioTarjeta() {
            document.getElementById('pantalla-medios').classList.add('hidden');
            document.getElementById('pantalla-tarjeta').classList.remove('hidden');
        }

        document.getElementById('btnFinalizarTarjeta').addEventListener('click', function() {
            const nombre = document.getElementById('card-name').value.trim();
            const numero = document.getElementById('card-number').value.trim();

            if (nombre === "" || numero === "") {
                alert("Por favor, introduce tu nombre y el número de tarjeta completo.");
                return;
            }

            alert("¡Pago Autorizado con Éxito! Tu transacción con tarjeta ha sido aprobada. Tu pedido ya se está preparando.");
            
            localStorage.removeItem('carrito');
            window.location.href = 'menu.html';
        });
        document.getElementById('card-number').addEventListener('input', function (e) {
            e.target.value = e.target.value.replace(/[^\d]/g, '').replace(/(.{4})/g, '$1 ').trim();
        });
    </script>
</body>
</html>
